<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Orders</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .navbar {
            background-color: #1f2a36;
        }

        .navbar-brand, .nav-link {
            color: white !important;
        }

        .table thead {
            background-color: #1f2a36;
            color: white;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .placed {
            background-color: #17a2b8;
            color: white;
        }

        .footer {
            background-color: #1f2a36;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
        }

        .items-list {
            padding-left: 15px;
            margin: 0;
        }
    </style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">🍔 FoodExpress</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-3">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/dashboard">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/orders">Orders</a>
                </li>
            </ul>
        </div>

        <div class="text-white">
            Admin ▼
        </div>
    </div>
</nav>

<!-- 🔹 CONTENT -->
<div class="container mt-4">

    <h3 class="mb-4">📦 Incoming Orders</h3>

    <table class="table table-bordered table-hover">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Restaurant</th>
                <th>Customer</th>
                <th>Items</th> 
                <th>Total (₹)</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="order : ${orders}">

                <td th:text="${order.id}"></td>

                <td th:text="${order.restaurant.name}"></td>

                <td th:text="${order.customer.name}"></td>

                <!-- ✅ MENU ITEMS -->
                <td>
                    <ul class="items-list">
                        <li th:each="item : ${order.orderItems}">
                            <p th:text="${item.menuItem.name}"></p>
                        </li>
                    </ul>
                </td>

                <td th:text="${order.totalAmount}"></td>

                <td>
                    <span class="status-badge placed"
                          th:text="${order.status}">
                    </span>
                </td>

            </tr>
        </tbody>
    </table>

</div>

<!-- 🔹 FOOTER -->
<div class="footer">
    <div class="container">
        <div class="row">

            <div class="col-md-4">
                <h5>🍔 FoodExpress</h5>
                <p>Fastest food delivery service</p>
            </div>

            <div class="col-md-4">
                <h5>Quick Links</h5>
                <p>Home</p>
                <p>Restaurants</p>
                <p>Login</p>
                <p>Register</p>
            </div>

            <div class="col-md-4">
                <h5>Contact</h5>
                <p>📍 India</p>
                <p>📞 +91 98765 43210</p>
                <p>✉ support@foodexpress.com</p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
