<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Restaurants</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>

<body>

	<div th:replace="fragments/header :: header"></div>

	<div class="container mt-4">
		<h3>Restaurants</h3>
		<a href="/admin/restaurants/add" class="btn btn-success mb-3">+ Add Restaurant</a>

		<table class="table table-bordered table-striped mt-3">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Restaurant Name</th>
        <th>Address</th>
        <th>Contact</th>
        <th>Status</th>
        <th>Owner Name</th>
        <th>Owner Email</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="restaurant : ${restaurants}">
        <td th:text="${restaurant.id}"></td>
        <td th:text="${restaurant.name}"></td>
        <td th:text="${restaurant.address}"></td>
        <td th:text="${restaurant.contact}"></td>

        <!-- Availability -->
        <td>
            <span th:if="${restaurant.available}" class="badge bg-success">
                Open
            </span>
            <span th:if="${!restaurant.available}" class="badge bg-danger">
                Closed
            </span>
        </td>

        <td th:text="${restaurant.owner.name}"></td>
        <td th:text="${restaurant.owner.email}"></td>
    </tr>
    </tbody>
</table>

		<a href="/admin/dashboard" class="btn btn-secondary btn-sm">
			← Back to Dashboard
		</a>
	</div>

	<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
