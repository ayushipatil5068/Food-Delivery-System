<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .menu-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .menu-img {
            height: 180px;
            object-fit: cover;
        }

        .price {
            font-size: 18px;
        }

        .cart-btn {
            border-radius: 25px;
        }

        .header-box {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            padding: 20px;
            border-radius: 12px;
        }

        .cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<!-- Cart Icon -->
<div class="cart-icon">
    <a href="/customer/cart" class="btn btn-dark position-relative">
        🛒 Cart
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              th:text="${cartCount}">
            0
        </span>
    </a>
</div>

<div class="container mt-4">

    <!-- Restaurant Header -->
    <div class="header-box mb-4">
        <h3>
            🍽 <span th:text="${restaurant.name}">Restaurant</span>
        </h3>
        <p class="mb-0">
            📍 <span th:text="${restaurant.address}">Address</span>
        </p>
    </div>

    <!-- Menu Items -->
    <div class="row">
        <div class="col-md-4 mb-4" th:each="item : ${menuItems}">
            <div class="card menu-card h-100">

                <!-- Image -->
                <img th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/300'}"
                     class="card-img-top menu-img"
                     alt="Food Image">

                <div class="card-body d-flex flex-column">

                    <h5 class="fw-bold" th:text="${item.name}">Item Name</h5>

                    <span class="badge bg-secondary mb-2"
                          th:text="${item.category}">
                        Category
                    </span>

                    <p class="text-muted small">
                        Delicious and freshly prepared food item.
                    </p>

                    <h6 class="text-success fw-bold mt-auto price">
                        ₹ <span th:text="${item.price}">0</span>
                    </h6>

                    <a th:href="@{/customer/cart/add/{id}(id=${item.id})}"
                       class="btn btn-primary cart-btn w-100 mt-2">
                        ➕ Add to Cart
                    </a>

                </div>
            </div>
        </div>
    </div>

    <!-- Empty Menu -->
    <div th:if="${#lists.isEmpty(menuItems)}"
         class="alert alert-warning text-center">
        No items available right now 😔
    </div>

    <!-- Back Button -->
    <a href="/customer/dashboard"
       class="btn btn-outline-dark mt-3">
        ← Back to Restaurants
    </a>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
