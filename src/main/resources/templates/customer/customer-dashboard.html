<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FoodExpress | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff5252;
            --success-green: #267e3e;
        }

        body { background-color: #f4f7f6; font-family: 'Poppins', sans-serif; }

        .action-card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
            background: white;
        }
        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .res-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            background: white;
            height: 100%;
        }
        .res-card:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .res-img-box {
            height: 200px;
            width: 100%;
            overflow: hidden;
            position: relative;
            background-color: #e0e0e0;
        }

        .res-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rating-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--success-green);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .res-details { padding: 20px; text-align: center; }
        .res-name { font-weight: 700; color: #2d3436; }
        .res-location { color: #636e72; font-size: 0.9rem; margin-bottom: 15px; }

        .btn-explore {
            background: transparent;
            border: 2px solid var(--primary-red);
            color: var(--primary-red);
            font-weight: 600;
            border-radius: 30px;
            padding: 8px 25px;
        }
        .btn-explore:hover {
            background: var(--primary-red);
            color: white;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-5">
    
    <!-- Welcome -->
    <div class="mb-5">
        <h2 class="fw-bold">
            👋 Welcome back, 
            <span th:text="${session.loggedInUser.name}" class="text-danger">User</span>
        </h2>
        <p class="text-muted">What are you craving today?</p>
    </div>

    <!-- Action Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-6">
            <a href="/customer/cart" class="text-decoration-none">
                <div class="card action-card shadow-sm p-3 d-flex flex-row align-items-center">
                    <i class="fas fa-shopping-basket fa-2x text-success me-3"></i>
                    <div>
                        <h5 class="mb-0 fw-bold text-dark">My Cart</h5>
                        <small class="text-muted">View your selected items</small>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-6">
            <a href="/customer/orders" class="text-decoration-none">
                <div class="card action-card shadow-sm p-3 d-flex flex-row align-items-center">
                    <i class="fas fa-truck-fast fa-2x text-warning me-3"></i>
                    <div>
                        <h5 class="mb-0 fw-bold text-dark">Track Orders</h5>
                        <small class="text-muted">Check your order history</small>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Restaurants -->
    <h3 class="fw-bold mb-4">Restaurants</h3>

    <div class="row g-4">
        <div class="col-md-4" th:each="res : ${restaurants}">
            <div class="res-card shadow-sm">

                <!-- ✅ IMAGE FIXED HERE -->
                <div class="res-img-box">
                    <img th:src="${res.imageUrl != null} ? ${res.imageUrl} : '/images/restaurant/default.png'" 
                         onerror="this.src='https://via.placeholder.com/500x300?text=FoodExpress+Restaurant'" 
                         alt="Restaurant Image">

                    <div class="rating-badge">
                        <i class="fas fa-star"></i> 4.1
                    </div>
                </div>

                <div class="res-details">
                    <h4 class="res-name" th:text="${res.name}">Hotel Name</h4>

                    <p class="res-location">
                        <i class="fas fa-map-marker-alt text-danger me-1"></i>
                        <span th:text="${res.address}">Location</span>
                    </p>

                    <a th:href="@{/customer/restaurant/{id}(id=${res.id})}" 
                       class="btn btn-explore">
                        View Menu
                    </a>
                </div>

            </div>
        </div>
    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
