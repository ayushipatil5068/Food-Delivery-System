<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h3>📦 My Orders</h3>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>Order ID</th>
            <th>Restaurant</th>
            <th>Order Time</th>
            <th>Total (₹)</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.restaurant.name}"></td>
            <td th:text="${#temporals.format(order.orderTime, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="${order.totalAmount}"></td>
            <td>
                <span th:switch="${order.status.name()}">

                    <span th:case="'ORDER_PLACED'" class="badge bg-secondary">
                        Order Placed
                    </span>

                    <span th:case="'PREPARING'" class="badge bg-warning text-dark">
                        Preparing
                    </span>

                    <span th:case="'OUT_FOR_DELIVERY'" class="badge bg-info text-dark">
                        Out for Delivery
                    </span>

                    <span th:case="'DELIVERED'" class="badge bg-success">
                        Delivered
                    </span>

                </span>
            </td>
        </tr>

        <tr th:if="${orders.isEmpty()}">
            <td colspan="5" class="text-center text-muted">
                No orders placed yet
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/customer/dashboard" class="btn btn-secondary mt-3">
        Back to Dashboard
    </a>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
