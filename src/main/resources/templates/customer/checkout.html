<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<div class="container mt-4">
    <h3>Checkout</h3>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>Item Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cartItem : ${cartItems}">
            <td th:text="${cartItem.item.name}"></td>
            <td th:text="${cartItem.item.price}"></td>
            <td th:text="${cartItem.quantity}"></td>
            <td th:text="${cartItem.totalPrice}"></td>
        </tr>
        </tbody>
    </table>

    <h4 class="mt-3">
        Total Amount: ₹ <span th:text="${total}"></span>
    </h4>

    <form th:action="@{/customer/place-order}" method="post">
        <button class="btn btn-success mt-3">
            Place Order
        </button>
        <a href="/customer/cart" class="btn btn-secondary mt-3">
            Back to Cart
        </a>
    </form>
</div>

</body>
</html>
