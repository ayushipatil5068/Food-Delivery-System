<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="header">

		<div class="container-fluid">
			<a class="navbar-brand" href="/">🍔 FoodExpress</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarNav">

				<!-- LEFT MENU -->
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" href="/">Home</a>
					</li>

					<li class="nav-item" th:if="${session.role == 'ADMIN'}">
						<a class="nav-link" href="/admin/dashboard">Admin Dashboard</a>
					</li>

					<li class="nav-item" th:if="${session.role == 'RESTAURANT'}">
						<a class="nav-link" href="/owner/dashboard">Owner Dashboard</a>
					</li>

					<li class="nav-item" th:if="${session.role == 'CUSTOMER'}">
						<a class="nav-link" href="/customer/dashboard">My Dashboard</a>
					</li>
				</ul>

				<!-- RIGHT MENU -->
				<ul class="navbar-nav">

					<!-- Not logged in -->
					<li class="nav-item" th:if="${session.loggedInUser == null}">
						<a class="nav-link" href="/login">Login</a>
					</li>

					<!-- Logged in -->
					<li class="nav-item dropdown" th:if="${session.loggedInUser != null}">

						<button class="nav-link dropdown-toggle bg-transparent border-0 text-white" type="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							<span th:text="${session.loggedInUser.name}">User</span>
						</button>


						<ul class="dropdown-menu dropdown-menu-end">
							<li>
								<span class="dropdown-item-text text-muted" th:text="${session.role}">
									ROLE
								</span>
							</li>

							<li>
								<hr class="dropdown-divider">
							</li>

							<li>
								<a class="dropdown-item text-danger" href="/logout">
									Logout
								</a>
							</li>
						</ul>
					</li>

				</ul>
			</div>
		</div>
	</nav>

	<!-- ✅ REQUIRED FOR DROPDOWN -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
