<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>FoodExpress | Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
background:#111;
}

/* Background Image */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
filter:brightness(0.3) blur(2px);
z-index:-3;
}

/* Glass Card */
.register-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:40px;
width:400px;
box-shadow:0 25px 50px rgba(0,0,0,0.6);
color:white;
z-index:10;
}

.card-header{
font-size:26px;
font-weight:700;
margin-bottom:25px;
text-align:center;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
font-size:13px;
color:rgba(255,255,255,0.8);
}

.input-container{
display:flex;
align-items:center;
background:white;
border-radius:30px;
padding:10px 20px;
}

.input-container i{
color:#ff5252;
margin-right:10px;
}

.input-container input,
.input-container select{
border:none;
outline:none;
width:100%;
}

.submit-btn{
background:#ff5252;
color:white;
border:none;
border-radius:30px;
padding:14px;
width:100%;
font-size:18px;
cursor:pointer;
}

.submit-btn:hover{
background:#ff3333;
}

.footer-link{
text-align:center;
margin-top:15px;
}

.footer-link a{
color:#f7b731;
}

/* 🍔 Falling Food Animation */
.falling-item{
position:absolute;
top:-60px;
pointer-events:none;
animation:fall linear forwards;
z-index:-1;
opacity:0;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="register-card">

<div class="card-header">🍔 FoodExpress</div>

<form th:action="@{/register}" th:object="${user}" method="post">

<div class="input-group">
<label>Name</label>
<div class="input-container">
<i class="fas fa-user"></i>
<input type="text" th:field="*{name}" required>
</div>
</div>

<div class="input-group">
<label>Email</label>
<div class="input-container">
<i class="fas fa-envelope"></i>
<input type="email" th:field="*{email}" required>
</div>
</div>

<div class="input-group">
<label>Password</label>
<div class="input-container">
<i class="fas fa-lock"></i>
<input type="password" th:field="*{password}" required>
</div>
</div>

<!-- Address -->
<div class="input-group" id="addressField" style="display:none;">
<label>Address</label>
<div class="input-container">
<i class="fas fa-map-marker-alt"></i>
<input type="text" th:field="*{address}">
</div>
</div>

<div class="input-group">
<label>Register As</label>
<div class="input-container">
<i class="fas fa-id-badge"></i>

<select id="roleSelect" th:field="*{role}" required>
<option value="">Select Role</option>
<option value="CUSTOMER">Customer</option>
<option value="RESTAURANT">Restaurant Owner</option>
<option value="DELIVERY_AGENT">Delivery Agent</option>
</select>

</div>
</div>

<button class="submit-btn">Register</button>

</form>

<div class="footer-link">
Already have account?
<a th:href="@{/login}">Login</a>
</div>

</div>

<script>

/* ===== Address Show/Hide ===== */

const roleSelect=document.getElementById("roleSelect");
const addressField=document.getElementById("addressField");

roleSelect.addEventListener("change",()=>{
addressField.style.display=
roleSelect.value==="CUSTOMER"?"block":"none";
});

window.onload=()=>{
if(roleSelect.value==="CUSTOMER"){
addressField.style.display="block";
}
};

/* ===== Falling Food Animation ===== */

const foodItems=['🍔','🍕','🍟','🍩','🌮','🍦','🍗','🥤','🍰'];

function createFood(){

const item=document.createElement("div");
item.className="falling-item";

item.innerText=
foodItems[Math.floor(Math.random()*foodItems.length)];

item.style.left=Math.random()*100+"vw";
item.style.fontSize=(Math.random()*25+20)+"px";

const duration=Math.random()*5+6;
item.style.animationDuration=duration+"s";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},duration*1000);
}

/* Spawn food continuously */
setInterval(createFood,350);

</script>

</body>
</html>
