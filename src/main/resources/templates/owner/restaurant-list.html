<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurants</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h3>Restaurants</h3>
    

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Contact</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="rest : ${restaurants}">
            <td th:text="${rest.name}"></td>
            <td th:text="${rest.address}"></td>
            <td th:text="${rest.contact}"></td>
            <td th:text="${rest.available ? 'Yes' : 'No'}"></td>
            <td>
                <a th:href="@{/owner/restaurants/edit/{id}(id=${rest.id})}" class="btn btn-primary btn-sm">Edit</a>
                
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
