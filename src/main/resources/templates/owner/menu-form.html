<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Add/Edit Menu Item</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>

<body>

	<div th:replace="fragments/header :: header"></div>

	<div class="container mt-4" style="max-width: 600px;">
		<h3 th:text="${menuItem.id != null} ? 'Edit Item' : 'Add Item'"></h3>

		<form th:action="@{/owner/menu/save}" th:object="${menuItem}" method="post">
			<input type="hidden" th:field="*{id}">
			<input type="hidden" th:field="*{restaurant.id}">

			<div class="mb-3">
				<label>Name</label>
				<input type="text" th:field="*{name}" class="form-control" required>
			</div>

			<div class="mb-3">
				<label>Category</label>
				<select th:field="*{category}" class="form-select" required>
					<option value="">Select</option>
					<option th:value="'Veg'">Veg</option>
					<option th:value="'Non-Veg'">Non-Veg</option>
					<option th:value="'Desserts'">Desserts</option>
					<option th:value="'Drinks'">Drinks</option>
				</select>
			</div>

			<div class="mb-3">
				<label>Price</label>
				<input type="number" th:field="*{price}" class="form-control" step="0.01" required>
			</div>

			<div class="mb-3">
				<label>Available</label>
				<select th:field="*{available}" class="form-select">
					<option th:value="true" th:text="'Yes'"></option>
					<option th:value="false" th:text="'No'"></option>
				</select>
			</div>

			<button class="btn btn-success">Save</button>
			<a th:href="@{/owner/menu/{restaurantId}(restaurantId=${restaurant.id})}"
				class="btn btn-secondary">Cancel</a>
		</form>
	</div>

	<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
