<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add/Edit Restaurant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4" style="max-width: 600px;">
    <h3 th:text="${restaurant.id != null} ? 'Edit Restaurant' : 'Add Restaurant'"></h3>

    <form th:action="@{/owner/restaurants/save}" th:object="${restaurant}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text" th:field="*{address}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contact</label>
            <input type="text" th:field="*{contact}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Available</label>
            <select th:field="*{available}" class="form-select">
                <option th:value="true" th:text="'Yes'"></option>
                <option th:value="false" th:text="'No'"></option>
            </select>
        </div>

        <button class="btn btn-success">Save</button>
        <a href="/owner/dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
