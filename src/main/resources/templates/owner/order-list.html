<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>

    <style>
        .items-list {
            margin: 0;
            padding-left: 18px;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h3>📦 Incoming Orders</h3>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>Order ID</th>
            <th>Restaurant</th>
            <th>Customer</th>
            <th>Items</th> <!-- ✅ NEW COLUMN -->
            <th>Total (₹)</th>
            <th>Status</th>
            <th>Actions</th>
            <th>Address</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="order : ${orders}">

            <td th:text="${order.id}"></td>

            <td th:text="${order.restaurant.name}"></td>

            <td th:text="${order.customer.name}"></td>

            <!-- ✅ MENU ITEMS DISPLAY -->
            <td>
                <ul class="items-list">
                    <li th:each="item : ${order.orderItems}">
                        <span th:text="${item.menuItem.name}"></span>
                        
                    </li>
                </ul>
            </td>

            <td th:text="${order.totalAmount}"></td>

            <td>
                <span class="badge bg-info" th:text="${order.status}"></span>
            </td>
            
           

            <td>

                <!-- ORDER_PLACED -->
                <form th:if="${order.status.name() == 'ORDER_PLACED'}"
                      th:action="@{/owner/orders/accept/{id}(id=${order.id})}"
                      method="post">
                    <button class="btn btn-success btn-sm">Accept</button>
                </form>

                <!-- PREPARING -->
                <form th:if="${order.status.name() == 'PREPARING'}"
                      th:action="@{/owner/orders/prepare/{id}(id=${order.id})}"
                      method="post">
                    <button class="btn btn-warning btn-sm">Mark Prepared</button>
                </form>

                <!-- OUT_FOR_DELIVERY -->
                <form th:if="${order.status.name() == 'OUT_FOR_DELIVERY'}"
                      th:action="@{/owner/orders/deliver/{id}(id=${order.id})}"
                      method="post">
                    <button class="btn btn-primary btn-sm">Mark Delivered</button>
                </form>

                <!-- DELIVERED -->
                <span th:if="${order.status.name() == 'DELIVERED'}"
                      class="text-success fw-bold">
                    Completed
                </span>

            </td>
             <td th:text="${order.customer.address}"></td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
