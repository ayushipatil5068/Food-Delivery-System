<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owner Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h3>Welcome, <span th:text="${session.loggedInUser.name}">Owner</span></h3>

    <h5 class="mt-4">Your Restaurant(s)</h5>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="restaurant : ${restaurants}">
            <td th:text="${restaurant.name}"></td>
            <td th:text="${restaurant.address}"></td>
            <td>
                <a th:href="@{/owner/restaurants/edit/{id}(id=${restaurant.id})}" class="btn btn-primary btn-sm">Edit Restaurant</a>
                <a th:href="@{/owner/menu/{restaurantId}(restaurantId=${restaurant.id})}" class="btn btn-success btn-sm">Manage Menu</a>
                <a href="/owner/orders" class="btn btn-dark btn-sm">View Orders</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
