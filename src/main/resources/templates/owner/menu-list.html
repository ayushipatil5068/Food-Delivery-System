<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu Items</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap JS (CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            defer></script>
</head>
<body>

<!-- Header Fragment -->
<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <h3 th:text="'Menu for ' + ${restaurant.name}"></h3>
    
    <!-- Add Menu Item Button -->
    <a th:href="@{/owner/menu/form/{restaurantId}(restaurantId=${restaurant.id})}" 
       class="btn btn-success mb-3">+ Add Item</a>

    <!-- Menu Items Table -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${menuItems}">
            <td th:text="${item.name}"></td>
            <td th:text="${item.category}"></td>
            <td th:text="${item.price}"></td>
            <td th:text="${item.available ? 'Yes' : 'No'}"></td>
            <td>
                <!-- Edit Button -->
                <a th:href="@{/owner/menu/form/{restaurantId}(restaurantId=${item.restaurant.id}, id=${item.id})}" 
                   class="btn btn-primary btn-sm">Edit</a>
                
                <!-- Delete Button -->
                <a th:href="@{/owner/menu/delete/{id}(id=${item.id})}" 
                   class="btn btn-danger btn-sm" 
                   th:onclick="return confirm('Are you sure you want to delete this item?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Back to Restaurants Button -->
    <a href="/owner/dashboard" class="btn btn-secondary">Back to Restaurants</a>
</div>

<!-- Footer Fragment -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
