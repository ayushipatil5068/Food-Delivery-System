<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>FoodExpress Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */
body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

/* ===== LOGIN CARD ===== */
.login-card{
width:400px;
padding:35px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
animation:fadeIn 1s ease-in-out;
z-index:10;
}

/* Fade Animation */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.login-title{
color:white;
font-weight:bold;
text-align:center;
}

.form-control{
border-radius:8px;
}

.btn-login{
background:#ff4d4d;
border:none;
transition:.3s;
}

.btn-login:hover{
background:#e63946;
transform:scale(1.05);
}

.extra-text{
color:white;
text-align:center;
margin-top:15px;
}

.extra-text a{
color:#ffc107;
text-decoration:none;
}

/* ===== 🍔 FALLING FOOD ===== */
.falling-item{
position:absolute;
top:-60px;
animation:fall linear forwards;
pointer-events:none;
z-index:1;
opacity:0;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="login-card">

<h3 class="login-title mb-4">🍔 FoodExpress Login</h3>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/login}" method="post">

<div class="mb-3">
<label class="text-white">Email</label>
<div class="input-group">
<span class="input-group-text">
<i class="fa fa-envelope"></i>
</span>
<input type="email" name="email"
class="form-control"
placeholder="Enter Email" required>
</div>
</div>

<div class="mb-3">
<label class="text-white">Password</label>
<div class="input-group">
<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>
<input type="password" name="password"
class="form-control"
placeholder="Enter Password" required>
</div>
</div>

<button class="btn btn-login w-100 text-white">
Login
</button>

</form>

<div class="extra-text">
Don't have an account?
<a href="/register">Register</a>
</div>

</div>

<!-- ===== FALLING FOOD SCRIPT ===== -->
<script>

const foodItems=['🍔','🍕','🍟','🍩','🌮','🍗','🍦','🥤','🍰'];

function createFood(){

const item=document.createElement("div");
item.className="falling-item";

item.innerText=
foodItems[Math.floor(Math.random()*foodItems.length)];

item.style.left=Math.random()*100+"vw";
item.style.fontSize=(Math.random()*25+20)+"px";

const duration=Math.random()*5+6;
item.style.animationDuration=duration+"s";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},duration*1000);
}

/* continuous animation */
setInterval(createFood,350);

</script>

</body>
</html>
